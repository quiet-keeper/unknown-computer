<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Терминал ARG: Забытый компьютер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 20px;
        }

        /* Контейнер-монитор */
        .terminal {
            background-color: #000000;
            width: 100%;
            max-width: 800px;
            height: 500px;
            border: 2px solid #3a6a7a;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(170, 240, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* "Стекло" терминала — эффект сканирования */
        .terminal::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(170, 240, 255, 0.02) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }

        /* Верхняя панель */
        .terminal-header {
            padding: 8px 15px;
            background: #0a1a1f;
            border-bottom: 1px solid #1a4a5a;
            display: flex;
            justify-content: space-between;
            color: #7ab3c2;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .title {
            text-shadow: 0 0 3px #3a8a9a;
        }

        .status {
            font-size: 11px;
        }

        /* Область вывода — скроллится */
        .output-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            color: #aaf0ff;
            font-size: 14px;
            line-height: 1.5;
            font-weight: 400;
            text-shadow: 0px 0px 1px #00ccff88;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Кастомный скролл */
        .output-area::-webkit-scrollbar {
            width: 6px;
        }
        .output-area::-webkit-scrollbar-track {
            background: #0a1a1f;
        }
        .output-area::-webkit-scrollbar-thumb {
            background: #2a6a7a;
            border-radius: 3px;
        }

        /* Строка ввода */
        .input-line {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #030c0e;
            border-top: 1px solid #1a4a5a;
            font-size: 14px;
        }

        .prompt {
            color: #5fbfcf;
            font-weight: bold;
            margin-right: 10px;
            white-space: nowrap;
        }

        .input-field {
            background: transparent;
            border: none;
            color: #aaf0ff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            flex: 1;
            outline: none;
            caret-color: #6fdfef;
        }

        /* Стиль для ссылок-подсказок (можно убрать, но для ARG полезно) */
        .hint {
            color: #2a8a9a;
            font-size: 11px;
            margin-top: 10px;
            border-top: 1px dashed #1a4a5a;
            padding-top: 8px;
        }

        /* Некоторые спец-сообщения */
        .secret {
            color: #ffdd77;
            text-shadow: 0 0 1px #ffaa33;
        }
        .warning {
            color: #ff8877;
        }
        .entry-title {
            color: #88ddff;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="terminal">
    <div class="terminal-header">
        <span class="title">⚡ USER-PC [SECURE_SHELL]</span>
        <span class="status">ONLINE | v.0.4b</span>
    </div>
    <div class="output-area" id="outputArea">
        <div>========================================</div>
        <div>ДОБРО ПОЖАЛОВАТЬ</div>
        <div>========================================</div>
        <div>Система восстановления данных v0.1</div>
        <div>Введите HELP для списка команд.</div>
        <div>Исследуйте логи ... возможно, тут есть чей-то дневник.</div>
        <div>&nbsp;</div>
        <div>> Система готова.</div>
    </div>
    <div class="input-line">
        <span class="prompt">user@unknown:~$</span>
        <input type="text" class="input-field" id="commandInput" autofocus>
    </div>
</div>

<script>
    // Данные, которые компьютер хранит в себе (скрытые послания, дневник, секретные файлы)
    // Игрок может листать их командами CAT, LIST или с помощью скрытых команд.

    // База данных "файлов" терминала
    const filesystem = {
        "readme.txt": "Этот терминал содержит архивы пользователя. Попробуй: LIST, CAT <file>, кроме того, есть секретные методы.",
        "diary_01.txt": "[ЗАПИСЬ #1] 20 декабря. Странно. В это месте время идёт иначе. Пространство также искажено. Возможно, этого места не существует. Код доступа? Может быть, 's3cr3t'?",
        "diary_02.txt": "[ЗАПИСЬ #2] Слишком холодно. Глубокое хроническое одиночество. Это серьёзнее чем может показаться. Представь что находишься в бесконечном космическом пространстве. Ты можешь слышать других людей по рации, их голоса и образы. Но ты не можешь присоединиться.",
        "diary_03.txt": "[ЗАПИСЬ #3] Мои идеи никому не нужны. Я пытаюсь создать изобретение что могло бы поменять жизнь людей к лучшему, но в одиночку на это у меня уйдёт вся жизнь. Здесь никого нет. Я один. Никто не хочет слушать меня... Нет, тут кто-то есть, просто я ещё не нашёл. Если кто-то читает это, введите 'SHADOW' - возможно, вы найдёте что-то важное. Надеюсь это вам поможет, путник. Будьте осторожны. Берегите себя.",
        "diary_04.txt": "[ЗАПИСЬ #4] Из тысячи отправленных сообщений, только на одно пришёл ответ. Я думал что не существую, до этого момента."
        "log_system.log": "[СИСТЕМА] 2024-04-21 : Обнаружены аномальные запросы / ВНИМАНИЕ! / Ищешь правду? (введи 'ROOT_ACCESS')",
        "note_private.txt": "==== ЛИЧНОЕ ==== \nЯ чувствую вину. Я прячу 'ключ' в простой фразе: \"LS -LA\" покажет скрытую директорию, а команда 'RECOVER' восстановит последний фрагмент дневника.",
    };

    // Скрытая директория (то, что не отображается в LIST, но доступно по спецкомандам)
    const hiddenEntries = {
        ".secret_angel": "[ЗАШИФРОВАННОЕ ПОСЛАНИЕ] ",
        ".final_confession": "====== ПОСЛЕДНЯЯ ЗАПИСЬ ======\nДневник обрывается. Я спрятал правду в изображении, но компьютер помнит пароль: WHL0137-LS",
        "hidden_cmd_list": "Секретные команды, которые работают в этом терминале:\n- SHADOW\n- UNLOCK MEMORY\n- ROOT_ACCESS\n- RECOVER\n- LS -LA (псевдоним)\n- HELP (обычная помощь)"
    };

    // Вспомогательная функция для вывода на экран
    const outputArea = document.getElementById('outputArea');
    const commandInput = document.getElementById('commandInput');

    function addToOutput(text, className = "") {
        const line = document.createElement('div');
        if (className) {
            line.className = className;
        }
        line.innerText = text;
        outputArea.appendChild(line);
        // Автоскролл вниз
        outputArea.scrollTop = outputArea.scrollHeight;
    }

    function clearOutput() {
        outputArea.innerHTML = '';
        addToOutput("> Очистка экрана...");
        addToOutput("> Терминал готов.", "hint");
    }

    // Обработка команд
    function processCommand(cmd) {
        const trimmed = cmd.trim().toLowerCase();
        const original = cmd.trim();
        
        // Пустая команда
        if (trimmed === "") {
            addToOutput("");
            return;
        }

        // Команда HELP
        if (trimmed === "help") {
            addToOutput("Доступные команды:", "entry-title");
            addToOutput("  LIST          - показать все доступные файлы (дневник, логи)", "hint");
            addToOutput("  CAT <file>    - прочитать содержимое файла", "hint");
            addToOutput("  CLEAR         - очистить экран терминала", "hint");
            addToOutput("  TIME          - показать системное время (но может быть странным)", "hint");
            addToOutput("  WHOAMI        - отобразить текущего пользователя", "hint");
            addToOutput("  HELP          - это сообщение", "hint");
            addToOutput("  === СЕКРЕТНЫЕ КОМАНДЫ (попробуйте найти сами) ===", "secret");
            return;
        }

        // LIST : показать имена обычных файлов
        if (trimmed === "list") {
            addToOutput("=== Доступные файлы в текущей директории ===", "entry-title");
            for (let file in filesystem) {
                addToOutput(`  📄 ${file}`, "hint");
            }
            addToOutput("=== Конец списка. Возможно, есть скрытое содержимое? ===", "entry-title");
            addToOutput("В некоторых файлах есть...", "warning");
            return;
        }

        // CAT file
        if (trimmed.startsWith("cat ")) {
            const fileName = original.substring(4).trim();
            if (filesystem[fileName]) {
                // Проверяем на наличие прямых подсказок внутри контента (ARS)
                let content = filesystem[fileName];
                addToOutput(`=== Содержимое ${fileName} ===`, "entry-title");
                const lines = content.split('\n');
                lines.forEach(line => {
                    if (line.includes("s3cr3t") || line.includes("SHADOW") || line.includes("ROOT_ACCESS") || line.includes("RECOVER")) {
                        addToOutput(line, "secret");
                    } else {
                        addToOutput(line);
                    }
                });
                addToOutput("=== Конец файла ===", "entry-title");
            } else if (hiddenEntries[fileName]) {
                addToOutput(`=== [СКРЫТЫЙ ФАЙЛ] ${fileName} ===`, "secret");
                addToOutput(hiddenEntries[fileName], "secret");
                addToOutput("Вы нашли тайный фрагмент!", "secret");
            } else {
                addToOutput(`Ошибка: файл "${fileName}" не найден. Попробуйте LIST.`, "warning");
            }
            return;
        }

        // TIME - немного с игровой атмосферой
        if (trimmed === "time") {
            const now = new Date();
            addToOutput(`Системное время ARG: ${now.toLocaleString()}`, "hint");
            addToOutput("Но внутренние часы компьютера сбиты... возможно, важна дата в записях.", "warning");
            return;
        }

        // WHOAMI
        if (trimmed === "whoami") {
            addToOutput("guest_user (уровень доступа: ограниченный)");
            addToOutput("Но сессия имеет следы предыдущего хозяина: 'North.'", "secret");
            return;
        }

        // CLEAR
        if (trimmed === "clear") {
            clearOutput();
            return;
        }

        // ============ СЕКРЕТНЫЕ КОМАНДЫ (основная механика ARG) ============
        
        // SHADOW - секретная команда из дневника (координаты убежища)
        if (trimmed === "shadow") {
            addToOutput(">>> [СИСТЕМА РАСШИФРОВКИ] <<<", "secret");
            addToOutput("Координаты убежища: 47.3769° N, 8.5417° E", "secret");
            addToOutput("Это подсказка для внешнего мира. Следуй за тенью.", "secret");
            addToOutput("(В дневнике было предупреждение...)", "warning");
            return;
        }

        // UNLOCK MEMORY - пробуждает секретный фрагмент
        if (trimmed === "unlock memory") {
            addToOutput("ВВЕДЕН КОД РАЗБЛОКИРОВКИ ПАМЯТИ", "secret");
            addToOutput("Извлечение скрытой записи #X:", "entry-title");
            addToOutput("«Ты нашел послание. В реальном мире найди ключ: 'TERMINAL_ECHO'»", "secret");
            addToOutput("Также теперь доступен скрытый файл: .secret_angel (используй CAT .secret_angel)", "hint");
            return;
        }

        // ROOT_ACCESS - показать системные логи
        if (trimmed === "root_access") {
            addToOutput("РЕЖИМ ROOT АКТИВИРОВАН (ЭМУЛЯЦИЯ)", "warning");
            addToOutput("Секретный дамп конфигурации:", "entry-title");
            addToOutput("> HINT: секретная команда 'LS -LA' покажет настоящие скрытые файлы.", "secret");
            addToOutput("> Админский бэкдор: введите 'RECOVER' для последнего сообщения.", "secret");
            return;
        }

        // RECOVER - последнее зашифрованное сообщение
        if (trimmed === "recover") {
            addToOutput("ЗАПУСК ПРОЦЕДУРЫ ВОССТАНОВЛЕНИЯ...", "warning");
            addToOutput(hiddenEntries[".final_confession"], "secret");
            addToOutput("Теперь вы можете прочитать и другие скрытые файлы, если знаете их имена.", "hint");
            addToOutput("Попробуйте: CAT .final_confession или CAT .secret_angel", "hint");
            return;
        }

        // Скрытая команда "ls -la" (имитация юникса)
        if (trimmed === "ls -la") {
            addToOutput("Показываю все объекты (включая скрытые):", "entry-title");
            for (let f in filesystem) {
                addToOutput(`  -rw-r--r--   ${f}`, "hint");
            }
            addToOutput("  [СКРЫТЫЕ]:", "secret");
            for (let h in hiddenEntries) {
                addToOutput(`  . (скрытый)  ${h}`, "secret");
            }
            addToOutput("Используйте CAT <имя_скрытого_файла> для чтения.", "hint");
            return;
        }

        // Дополнительный пасхалка-команда, которая вызывает больше дневниковой атмосферы
        if (trimmed === "diary") {
            addToOutput("=== Полный список дневников ===");
            addToOutput("diary_01.txt, diary_02.txt, diary_03.txt", "hint");
            addToOutput("Также есть скрытая команда 'SHADOW' и 'UNLOCK MEMORY'", "secret");
            return;
        }

        // Если команда не распознана
        addToOutput(`Неизвестная команда: "${original}". Введите HELP.`, "warning");
    }

    // Отслеживаем ввод
    commandInput.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            const command = commandInput.value;
            if (command.trim() !== "") {
                // Печатаем введенную строку в стиле терминала
                addToOutput(`user@unknown:~$ ${command}`);
                processCommand(command);
            }
            commandInput.value = '';  // очищаем поле
            // Оставляем фокус
            commandInput.focus();
        }
    });

    // Фокус на странице — автоматически ставим курсор в поле ввода
    document.body.addEventListener('click', () => {
        commandInput.focus();
    });
    commandInput.focus();

    // Небольшая вступительная подсказка - можно показать первый скрытый намёк через 3 секунды
    setTimeout(() => {
        addToOutput(">>> [СИСТЕМНЫЙ ШЕПОТ] Воспоминания активируются.... Похоже, бывший владелец оставил скрытые команды. Ищите подсказки внутри файлов diary.", "secret");
    }, 1800);
</script>
</body>
</html>
