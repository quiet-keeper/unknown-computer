<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARG :: Терминал доступа [v0.2]</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #03070f;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 20px;
        }

        .crt {
            width: 900px;
            max-width: 100%;
            height: 600px;
            background-color: #000000;
            border: 2px solid #14f0f0;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 10px rgba(0, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.03) 0px,
                rgba(0, 255, 255, 0.03) 2px,
                transparent 2px,
                transparent 6px
            );
            pointer-events: none;
            z-index: 2;
        }

        .terminal-header {
            background-color: #0a1a1a;
            padding: 8px 15px;
            border-bottom: 1px solid #14f0f0;
            display: flex;
            justify-content: space-between;
            color: #7ff5f5;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .blink {
            background-color: #14f0f0;
            color: black;
            padding: 0 6px;
            animation: blink-animation 1s step-end infinite;
        }

        @keyframes blink-animation {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .terminal-output {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            color: #add8e6;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .command-line {
            margin-top: 5px;
            display: flex;
            align-items: center;
            background-color: #000000;
            border-top: 1px solid #1a3b3b;
            padding: 10px;
        }

        .prompt-label {
            color: #00ffff;
            font-weight: bold;
            margin-right: 10px;
        }

        #command-input {
            background: transparent;
            border: none;
            color: #add8e6;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            flex: 1;
            outline: none;
            caret-color: #00ffff;
        }

        .terminal-output::-webkit-scrollbar {
            width: 6px;
        }
        .terminal-output::-webkit-scrollbar-track {
            background: #000000;
        }
        .terminal-output::-webkit-scrollbar-thumb {
            background: #14f0f0;
            border-radius: 3px;
        }

        .help-tip {
            font-size: 11px;
            color: #3a6e6e;
            text-align: center;
            border-top: 1px solid #111;
            padding: 4px;
        }
        
        /* Эффект глитча */
        .glitch-effect {
            animation: terminalGlitch 0.2s 3;
        }
        
        @keyframes terminalGlitch {
            0% { transform: translate(0); opacity: 1; }
            20% { transform: translate(-3px, 1px); opacity: 0.8; }
            40% { transform: translate(3px, -1px); opacity: 0.9; }
            60% { transform: translate(-1px, 2px); opacity: 0.85; }
            80% { transform: translate(1px, -2px); opacity: 0.95; }
            100% { transform: translate(0); opacity: 1; }
        }
        
        /* Для ASCII-рикролла */
        .ascii-art {
            color: #0f0;
            white-space: pre;
            font-family: monospace;
            font-size: 10px;
            line-height: 1.2;
            margin: 10px 0;
        }
    </style>
</head>
<body>
<div class="crt" id="crtContainer">
    <div class="terminal-header">
        <span>SYSTEM://ARG_EMU_V0.2</span>
        <span>🌐 NETWORK: <span style="color:#ff6666;">⚠️ НЕСТАБИЛЬНО</span> ★ <span class="blink">▲</span></span>
    </div>
    <div class="terminal-output" id="output-area">
        <div>> Инициализация нейросвязи...</div>
        <div>> Система загружена. Введите HELP для списка команд.</div>
        <div>> -------------------------------------------------</div>
    </div>
    <div class="command-line">
        <span class="prompt-label">[guest@sys] $&gt;</span>
        <input type="text" id="command-input" autofocus>
    </div>
    <div class="help-tip">
        📟 Команды: help | ls | read [файл] | find [ключ] | strings | final | clear
    </div>
</div>

<script>
    // ============================================================
    // КОМБО-ЛОВУШКА (стиль Cicada 3301)
    // ============================================================
    
    let trapActivated = false;
    let caesarSolved = false;
    
    // Функция для отображения ASCII-рикролла (финал ловушки)
    function asciiRickRoll() {
        const outputDiv = document.getElementById('output-area');
        outputDiv.innerHTML = '';
        
        const rickLines = [
            "╔════════════════════════════════════════════════════════════════╗",
            "║                                                                ║",
            "║     ██████╗ ██╗ ██████╗██╗  ██╗██████╗  ██████╗ ██╗     ██╗     ║",
            "║     ██╔══██╗██║██╔════╝██║ ██╔╝██╔══██╗██╔═══██╗██║     ██║     ║",
            "║     ██████╔╝██║██║     █████╔╝ ██████╔╝██║   ██║██║     ██║     ║",
            "║     ██╔══██╗██║██║     ██╔═██╗ ██╔══██╗██║   ██║██║     ██║     ║",
            "║     ██║  ██║██║╚██████╗██║  ██╗██║  ██║╚██████╔╝███████╗███████╗║",
            "║     ╚═╝  ╚═╝╚═╝ ╚═════╝╚═╝  ╚═╝╚═╝  ╚═╝ ╚═════╝ ╚══════╝╚══════╝║",
            "║                                                                ║",
            "║           NEVER GONNA GIVE YOU UP                              ║",
            "║           NEVER GONNA LET YOU DOWN                            ║",
            "║           NEVER GONNA RUN AROUND AND DESERT YOU               ║",
            "║                                                                ║",
            "║     [СИСТЕМА] Несанкционированный доступ зафиксирован.        ║",
            "║     [СИСТЕМА] Доступ к основным функциям заблокирован.        ║",
            "╚════════════════════════════════════════════════════════════════╝"
        ];
        
        rickLines.forEach(line => {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'ascii-art';
            lineDiv.style.color = '#0f0';
            lineDiv.style.fontSize = '11px';
            lineDiv.innerHTML = line;
            outputDiv.appendChild(lineDiv);
        });
        
        // Добавляем аудио (опционально)
        const audio = new Audio();
        audio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
        // audio.play(); // Раскомментируй, если хочешь музыку
    }
    
    // Шаг 4: Финальный удар — ASCII-рикролл
    function finalRickRoll() {
        const container = document.getElementById('crtContainer');
        container.classList.add('glitch-effect');
        
        appendToTerminal("\n⚠️ СИСТЕМНЫЙ СБОЙ: ОБНАРУЖЕНА АНОМАЛИЯ В КОДЕ ⚠️", true);
        appendToTerminal("> ...");
        appendToTerminal("> ЗАПУСК АВАРИЙНОГО ПРОТОКОЛА...");
        
        setTimeout(() => {
            asciiRickRoll();
        }, 1500);
    }
    
    // Шаг 3: Проверка шифра Цезаря (после того, как игрок нашёл фальшивую картинку)
    function checkCaesar(input) {
        // Ожидаемый ответ: "THE TRAP IS REAL" (после расшифровки)
        // Зашифровано со сдвигом 3: "WKH WUDS LV EHDO"
        const expectedCaesarAnswer = "wkh wuds lv ehdo";
        if (input.toLowerCase() === expectedCaesarAnswer) {
            caesarSolved = true;
            appendToTerminal("\n✅ РАСШИФРОВКА УСПЕШНА.", false);
            appendToTerminal("> Ты думал, что нашёл истину?");
            appendToTerminal("> Но... ЭТО БЫЛА ЛОВУШКА.");
            appendToTerminal("> Настоящий финал в другом месте.");
            appendToTerminal("> А теперь...");
            setTimeout(() => {
                finalRickRoll();
            }, 2000);
            return true;
        }
        return false;
    }
    
    // Шаг 2: Показать фальшивую картинку (ASCII-арт + скрытый шифр Цезаря)
    function showFakeImage() {
        appendToTerminal("\n🖼️ ЗАГРУЗКА ИЗОБРАЖЕНИЯ: 'sunset_terminal.png'");
        appendToTerminal("> Вот что скрыто в файле:\n");
        
        // ASCII-арт "картинки" с закатом
        const sunsetAscii = [
            "        🌅",
            "    🌞───────",
            "   ──🌊🌊🌊──",
            "  ──────────",
            "",
            "[Метаданные изображения]",
            "Комментарий: WKH WUDS LV EHDO",
            "Цветовая палитра: 0xDE 0xAD 0xBE 0xEF"
        ];
        
        sunsetAscii.forEach(line => {
            appendToTerminal(line);
        });
        
        appendToTerminal("\n🔍 [СИСТЕМА] Обнаружена странная строка в метаданных: 'WKH WUDS LV EHDO'");
        appendToTerminal("> Возможно, это шифр...");
    }
    
    // Шаг 1: Первый уровень — фальшивый финал (игрок думает, что прошёл игру)
    function fakeFinal() {
        if (trapActivated) return;
        trapActivated = true;
        
        appendToTerminal("\n✨✨✨ ПОЗДРАВЛЯЮ! ✨✨✨");
        appendToTerminal("> Ты достиг ФИНАЛА ARG.");
        appendToTerminal("> Вот твоя награда — секретное изображение...");
        appendToTerminal("> ");
        setTimeout(() => {
            showFakeImage();
        }, 1500);
    }

    // ============================================================
    // ОСНОВНАЯ ЛОГИКА ТЕРМИНАЛА
    // ============================================================

    const FILESYSTEM = {
        "diary.txt": `=== ДНЕВНИК ===\n\n[ЗАПИСЬ #1 | 2016-11-28]\nСегодня очень холодно. Ответ так и не был получен...`,
        "notes.txt": `[ЗАМЕТКИ РУКОЙ]\nГлавный пароль: [НЕ РАЗОБРАТЬ]\nПодсказка: hex(11) = B, hex(25) = ?`,
        "syslog.bin": `SYS_DATA:0x00 0xFF [МУСОР] 0xDE 0xAD 0xBE 0xEF`
    };

    const outputDiv = document.getElementById('output-area');
    const inputField = document.getElementById('command-input');
    let commandHistory = [];
    let historyIndex = -1;

    function appendToTerminal(text, isError = false) {
        const line = document.createElement('div');
        if (isError) {
            line.style.color = "#f0a0a0";
            line.innerHTML = `⚠️ ${text}`;
        } else {
            line.innerHTML = text;
        }
        outputDiv.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function listFiles() {
        const files = Object.keys(FILESYSTEM);
        appendToTerminal("📁 Доступные файлы для чтения:");
        files.forEach(file => appendToTerminal(`   - ${file}`));
        appendToTerminal("(Используйте 'read [имя_файла]' чтобы открыть)");
    }

    function readFile(filename) {
        const file = FILESYSTEM[filename];
        if (file) {
            appendToTerminal(`\n📄 Содержимое ${filename}:\n${file}\n`);
        } else {
            appendToTerminal(`Файл "${filename}" не найден.`, true);
        }
    }

    function showHelp() {
        appendToTerminal("\n=== ДОСТУПНЫЕ КОМАНДЫ ===");
        appendToTerminal(" help          - Показать эту справку");
        appendToTerminal(" ls            - Показать список файлов");
        appendToTerminal(" read [file]   - Прочитать содержимое файла");
        appendToTerminal(" final         - Завершить игру (⚠️ НЕОБРАТИМО)");
        appendToTerminal(" clear         - Очистить экран терминала");
        appendToTerminal("-------------------------------------------------");
        appendToTerminal("💡 Подсказка: Попробуй 'final', если хочешь закончить...");
    }

    function clearScreen() {
        outputDiv.innerHTML = '';
        appendToTerminal("> Экран очищен. Введите help для команд.");
    }

    function processCommand(input) {
        let trimmed = input.trim();
        if (trimmed === "") return;

        appendToTerminal(`[guest@sys] $&gt; ${input}`);

        const parts = trimmed.toLowerCase().split(/\s+/);
        const command = parts[0];
        const args = parts.slice(1);

        // ============================================
        // КОМБО-ЛОВУШКА: проверка на каждом шаге
        // ============================================
        
        // Если игрок уже в ловушке на уровне шифра Цезаря
        if (trapActivated && !caesarSolved) {
            if (checkCaesar(trimmed)) {
                return; // Ловушка продолжается, дальше не обрабатываем
            }
        }
        
        // Команда для ЗАПУСКА ловушки (фальшивый финал)
        if (command === "final" && !trapActivated) {
            fakeFinal();
            return;
        }
        
        // Если ловушка уже активирована, но игрок не ввёл шифр — блокируем другие команды
        if (trapActivated && !caesarSolved) {
            appendToTerminal("> Система ожидает расшифровку метаданных...", true);
            appendToTerminal("> Попробуй расшифровать строку из изображения.", true);
            return;
        }
        
        // Если игрок уже получил рикролл — ничего не работает
        if (caesarSolved) {
            appendToTerminal("> СИСТЕМА ЗАБЛОКИРОВАНА. Доступ невозможен.", true);
            return;
        }

        // Обычные команды (до активации ловушки)
        switch (command) {
            case "help":
                showHelp();
                break;
            case "ls":
                listFiles();
                break;
            case "read":
                if (args.length === 0) {
                    appendToTerminal("Укажите имя файла.", true);
                } else {
                    readFile(args[0]);
                }
                break;
            case "clear":
                clearScreen();
                break;
            default:
                appendToTerminal(`Ошибка: '${command}' не найдена. Введите help.`, true);
                break;
        }
    }

    inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = inputField.value;
            if (cmd.trim() !== "") {
                commandHistory.push(cmd);
                historyIndex = commandHistory.length;
                processCommand(cmd);
                inputField.value = "";
            }
            e.preventDefault();
        } else if (e.key === 'ArrowUp') {
            if (commandHistory.length > 0 && historyIndex > 0) {
                historyIndex--;
                inputField.value = commandHistory[historyIndex];
            }
            e.preventDefault();
        } else if (e.key === 'ArrowDown') {
            if (historyIndex < commandHistory.length - 1) {
                historyIndex++;
                inputField.value = commandHistory[historyIndex];
            } else if (historyIndex === commandHistory.length - 1) {
                historyIndex++;
                inputField.value = "";
            }
            e.preventDefault();
        }
    });

    document.body.addEventListener('click', () => {
        if (!caesarSolved) {
            inputField.focus();
        }
    });
    inputField.focus();
</script>
</body>
</html>
