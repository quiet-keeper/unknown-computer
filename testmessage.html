<!DOCTYPE html>
<html>
<head>
    <title>старый телефон</title>
    <style>
        /* здесь твои стили, из предыдущего кода, оставляем как есть */
    </style>
</head>
<body>
<div class="phone">
    <div class="screen">
        <h3>📟 СТАРЫЙ ТЕЛЕФОН</h3>

        <div id="newMessageSection">
            <textarea id="message" rows="4" placeholder="напиши что хочешь. в пустоту."></textarea>
            <button id="sendBtn">отправить</button>
        </div>

        <hr />

        <div id="checkResponseSection">
            <input type="text" id="codeInput" placeholder="код письма" style="width: 70%; background: #121620; border:1px solid #2a3a5a; color:#8db5e5; padding: 8px;" />
            <button id="checkBtn">проверить ответ</button>
        </div>

        <div id="status" class="status"></div>
        <div id="responseArea" class="status" style="margin-top: 20px; white-space: pre-wrap;"></div>
    </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/ТВОЯ_ССЫЛКА/exec';

document.getElementById('sendBtn').onclick = async () => {
    const message = document.getElementById('message').value;
    if (!message) return;

    const statusDiv = document.getElementById('status');
    statusDiv.innerHTML = 'отправляю...';

    const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ message: message }),
    });
    const result = await response.json();

    if (result.success) {
        statusDiv.innerHTML = `отправлено. сохрани код: <strong>${result.code}</strong><br>вернись с ним за ответом.`;
        document.getElementById('message').value = '';
    } else {
        statusDiv.innerHTML = 'ошибка. попробуй ещё.';
    }
};

document.getElementById('checkBtn').onclick = async () => {
    const code = document.getElementById('codeInput').value.trim();
    if (!code) return;

    const statusDiv = document.getElementById('status');
    const responseArea = document.getElementById('responseArea');
    statusDiv.innerHTML = 'ищу ответ...';

    const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ checkCode: code }),
    });
    const result = await response.json();

    if (result.hasResponse) {
        responseArea.innerHTML = `📨 ответ из пустоты:<br>${result.response}`;
        statusDiv.innerHTML = '';
    } else {
        responseArea.innerHTML = '';
        statusDiv.innerHTML = 'ответа пока нет. пустота ещё думает. загляни позже.';
    }
};
</script>
</body>
</html>
