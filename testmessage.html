<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>старый телефон</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        /* Телефон с твоей картинкой */
        .phone {
            max-width: 500px;
            width: 100%;
            background-image: url('телефон_фон.png');  /* сюда твой рисунок */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            padding: 60px 25px 40px 25px;  /* подстрой под свою картинку */
            border-radius: 40px;
        }

        /* Экран — поверх твоего рисунка */
        .screen {
            background: rgba(5, 10, 20, 0.85);  /* полупрозрачный, чтобы рисунок просвечивал */
            backdrop-filter: blur(2px);
            border-radius: 20px;
            padding: 20px;
            color: #8db5e5;
            border: 1px solid rgba(80, 120, 160, 0.5);
            box-shadow: 0 0 15px rgba(0, 20, 40, 0.5);
            animation: flicker 0.2s infinite alternate;
        }

        /* мерцание экрана */
        @keyframes flicker {
            0% { opacity: 0.95; text-shadow: 0 0 1px #8db5e5; }
            100% { opacity: 1; text-shadow: 0 0 3px #5a9aba; }
        }

        textarea, input {
            width: 100%;
            background: #0a0f18;
            border: 1px solid #2a4a6a;
            color: #bdd4ff;
            font-family: 'Courier New', monospace;
            padding: 12px;
            border-radius: 12px;
            box-sizing: border-box;
            margin: 8px 0;
            transition: all 0.2s;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: #8db5e5;
            box-shadow: 0 0 8px #2a5a8a;
        }

        button {
            background: #1a2a3a;
            border: 1px solid #3a6a8a;
            color: #bdd4ff;
            padding: 12px;
            font-family: 'Courier New', monospace;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin: 5px 0;
            transition: 0.2s;
        }

        button:hover {
            background: #2a3a4a;
            border-color: #5a9aba;
            text-shadow: 0 0 3px #5a9aba;
            box-shadow: 0 0 5px #2a5a8a;
        }

        .divider {
            margin: 20px 0;
            border-top: 1px dashed #2a4a6a;
        }

        .status {
            font-size: 12px;
            color: #6a8aaa;
            margin-top: 10px;
            text-align: center;
        }

        .response-box {
            background: #0a1a2a;
            border-left: 3px solid #5a9aba;
            padding: 12px;
            margin-top: 15px;
            white-space: pre-wrap;
            font-size: 13px;
            border-radius: 12px;
        }

        .star-code {
            color: #ffcc88;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* полосы развёртки */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
<div class="scanlines"></div>
<div class="phone">
    <div class="screen">
        <h3>📟 СТАРЫЙ ТЕЛЕФОН</h3>
        <p style="font-size: 12px; opacity: 0.8;">этот аппарат помнит голоса тех, кто был один. оставь свой след.</p>

        <textarea id="newMessage" rows="4" placeholder="напиши что хочешь... кому-то в пустоту..."></textarea>
        <button id="sendBtn">📨 отправить</button>
        <div id="sendStatus" class="status"></div>

        <div class="divider"></div>

        <input type="text" id="letterId" placeholder="введи звёздный позывной">
        <button id="checkBtn">📬 проверить ответ</button>
        <div id="checkStatus" class="status"></div>
        <div id="responseContent" class="response-box" style="display: none;"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlZA55V1R-N17owF_slHhZjylw-Jlcpi1_NTbXAhdtiMczSmM1GCo70oH4VNU90suO/exec';

    const sendBtn = document.getElementById('sendBtn');
    const newMessage = document.getElementById('newMessage');
    const sendStatus = document.getElementById('sendStatus');

    sendBtn.onclick = async () => {
        const message = newMessage.value.trim();
        if (!message) {
            sendStatus.innerHTML = '❄️ поле пусто...';
            return;
        }

        sendStatus.innerHTML = '📡 отправляю...';
        sendBtn.disabled = true;

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ message: message })
            });
            const result = await response.json();

            if (result.success) {
                sendStatus.innerHTML = ` отправлено! твой звёздный позывной: <span class="star-code">${result.code}</span><br>сохрани его. вернись с ним за ответом... когда нибудь`;
                newMessage.value = '';
            } else {
                sendStatus.innerHTML = '❌ ошибка. попробуй ещё.';
            }
        } catch (error) {
            sendStatus.innerHTML = '❌ не получилось отправить.';
        } finally {
            sendBtn.disabled = false;
        }
    };

    const checkBtn = document.getElementById('checkBtn');
    const letterId = document.getElementById('letterId');
    const checkStatus = document.getElementById('checkStatus');
    const responseContent = document.getElementById('responseContent');

    checkBtn.onclick = async () => {
        const code = letterId.value.trim();
        if (!code) return;

        checkStatus.innerHTML = '🔍 ищу ответ...';
        responseContent.style.display = 'none';

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ checkCode: code })
            });
            const result = await response.json();

            if (result.hasResponse) {
                responseContent.innerHTML = `<strong>✨ ответ из пустоты:</strong><br>${escapeHtml(result.response)}`;
                responseContent.style.display = 'block';
                checkStatus.innerHTML = '';
            } else if (result.error) {
                checkStatus.innerHTML = '❌ ошибка проверки.';
            } else {
                checkStatus.innerHTML = 'Ответа пока нет. пустота думает. загляни позже.';
            }
        } catch (error) {
            checkStatus.innerHTML = '❌ ошибка проверки.';
        }
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }
</script>
</body>
</html>
